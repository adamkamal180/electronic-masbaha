<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-TK6242YVKZ"></script>
<script>

  function gtag(){dataLayer.push(arguments);}

  gtag('config', 'G-TK6242YVKZ');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المسبحة الإلكترونية الذكية</title>
    <style>
        :root {
            --bg-color: #FFFFFF;
            --text-color: #000000;
            --accent-color: #FF8C00;
            --border-color: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            cursor: pointer;
            position: relative;
        }

        /* شريط التحكم العلوي */
        .top-controls {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 20px;
        }

        .top-btn-group {
            display: flex;
            gap: 10px;
        }

        .target-btn, .action-btn {
            height: 55px;
            background-color: var(--bg-color);
            border: 3px solid var(--border-color);
            color: var(--text-color);
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
        }

        .target-btn {
            width: 55px;
            border-radius: 50%;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .action-btn {
            padding: 0 20px;
            border-radius: 27.5px;
            font-size: 1.1rem;
        }

        /* زر الإحصائيات */
        .stats-btn {
            background-color: var(--accent-color);
            color: #FFFFFF;
            border-color: var(--accent-color);
        }

        /* صندوق العبارة */
        .dhikr-container {
            width: 100%;
            margin-bottom: 30px;
        }

        .dhikr-dropdown {
            width: 100%;
            padding: 20px 15px;
            font-size: 2rem;
            font-weight: 900;
            text-align: center;
            text-align-last: center;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 4px solid var(--border-color);
            border-radius: 15px;
            outline: none;
            appearance: none;
            cursor: pointer;
            white-space: normal;
            line-height: 1.5;
        }

        /* العداد المركزي */
        .counter-display {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle {
            width: 280px;
            height: 280px;
            background-color: var(--bg-color);
            border: 12px solid var(--accent-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 6.5rem;
            font-weight: 900;
            color: var(--text-color);
            transition: transform 0.05s ease-in-out;
        }

        .circle:active {
            transform: scale(0.97);
        }

        /* الإحصائيات السفلية */
        .statistics-bar {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 10px;
        }

        .stat-box {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 15px;
            border-radius: 15px;
            border: 3px solid var(--border-color); 
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .stat-value {
            color: var(--accent-color);
        }

        /* ==================================
           نظام الخريطة الحرارية (Heatmap) 
           ================================== */
        .modal-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .heatmap-container {
            width: 100%;
            background-color: var(--bg-color);
            border: 4px solid var(--border-color);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .heatmap-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--text-color);
        }

        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 20px;
            direction: ltr; /* لضمان ترتيب الأيام تصاعدياً من اليسار لليمين */
        }

        .heat-box {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 6px;
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .heat-box:active {
            transform: scale(0.9);
        }

        /* درجات الكثافة للون البرتقالي باستخدام الشفافية */
        .heat-box[data-intensity="1"] { background-color: rgba(255, 140, 0, 0.25); border-color: rgba(255, 140, 0, 0.5); }
        .heat-box[data-intensity="2"] { background-color: rgba(255, 140, 0, 0.5); border-color: rgba(255, 140, 0, 0.8); }
        .heat-box[data-intensity="3"] { background-color: rgba(255, 140, 0, 0.75); border-color: var(--accent-color); }
        .heat-box[data-intensity="4"] { background-color: var(--accent-color); border-color: var(--accent-color); }

        .close-modal-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--border-color);
            color: var(--bg-color);
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }

        .heatmap-legend {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            margin-top: 15px;
            font-size: 0.9rem;
            font-weight: bold;
            direction: rtl;
        }
        
        .legend-box {
            width: 15px; height: 15px;
            border-radius: 3px;
            border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>
    <div class="app-container" id="tapArea">
        
        <header class="top-controls">
            <button id="targetBtn" class="target-btn">∞</button>
            <div class="top-btn-group">
                <button id="openStatsBtn" class="action-btn stats-btn">النشاط</button>
                <button id="resetBtn" class="action-btn">تصفير</button>
            </div>
        </header>

        <div class="dhikr-container">
            <select id="dhikrSelect" class="dhikr-dropdown">
                <option value="سُبْحَانَ اللَّهِ وَبِحَمْدِهِ">سُبْحَانَ اللَّهِ وَبِحَمْدِهِ ▼</option>
                <option value="أَسْتَغْفِرُ اللَّهَ وَأَتُوبُ إِلَيْهِ">أَسْتَغْفِرُ اللَّهَ وَأَتُوبُ إِلَيْهِ ▼</option>
                <option value="اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ">اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ ▼</option>
                <option value="لَا إِلَهَ إِلَّا اللَّهُ">لَا إِلَهَ إِلَّا اللَّهُ ▼</option>
                <option value="لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ">لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ ▼</option>
                <option value="حَسْبِيَ اللَّهُ وَنِعْمَ الْوَكِيلُ">حَسْبِيَ اللَّهُ وَنِعْمَ الْوَكِيلُ ▼</option>
                <option value="الْحَمْدُ لِلَّهِ">الْحَمْدُ لِلَّهِ ▼</option>
                <option value="اللَّهُ أَكْبَرُ">اللَّهُ أَكْبَرُ ▼</option>
                <option value="custom">عبارة مخصصة... ▼</option>
            </select>
        </div>

        <main class="counter-display">
            <div class="circle" id="mainCounter">0</div>
        </main>

        <footer class="statistics-bar">
            <div class="stat-box">الإجمالي : <span id="currentTotal" class="stat-value">0</span></div>
            <div class="stat-box">المجموع الكلي : <span id="globalTotal" class="stat-value">0</span></div>
        </footer>

        <div id="statsModal" class="modal-overlay">
            <div class="heatmap-container">
                <div class="heatmap-title">نشاطك في آخر 35 يوماً</div>
                <div id="heatmapGrid" class="heatmap-grid">
                    </div>
                <div class="heatmap-legend">
                    <span>أقل</span>
                    <div class="legend-box" style="background-color: var(--bg-color);"></div>
                    <div class="legend-box" style="background-color: rgba(255, 140, 0, 0.25);"></div>
                    <div class="legend-box" style="background-color: rgba(255, 140, 0, 0.5);"></div>
                    <div class="legend-box" style="background-color: rgba(255, 140, 0, 0.75);"></div>
                    <div class="legend-box" style="background-color: var(--accent-color);"></div>
                    <span>أكثر</span>
                </div>
                <br>
                <button id="closeStatsBtn" class="close-modal-btn">إغلاق</button>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tapArea = document.getElementById('tapArea');
            const dhikrSelect = document.getElementById('dhikrSelect');
            const mainCounterEl = document.getElementById('mainCounter');
            const currentTotalEl = document.getElementById('currentTotal');
            const globalTotalEl = document.getElementById('globalTotal');
            const resetBtn = document.getElementById('resetBtn');
            const targetBtn = document.getElementById('targetBtn');
            const openStatsBtn = document.getElementById('openStatsBtn');
            const closeStatsBtn = document.getElementById('closeStatsBtn');
            const statsModal = document.getElementById('statsModal');
            const heatmapGrid = document.getElementById('heatmapGrid');

            let currentDhikr = dhikrSelect.value;
            let counts = JSON.parse(localStorage.getItem('dhikrCounts_v5')) || {};
            let globalTotal = parseInt(localStorage.getItem('globalTotal_v5')) || 0;
            // هيكل البيانات الجديد للمصفوفة الحرارية
            let dailyActivity = JSON.parse(localStorage.getItem('dailyActivity_v5')) || {}; 
            let currentSessionCount = 0;
            
            const targetOptions = [0, 33, 99];
            let currentTargetIndex = parseInt(localStorage.getItem('masbahaTargetIndex_v5')) || 0;
            let currentTarget = targetOptions[currentTargetIndex];

            if (!counts[currentDhikr]) counts[currentDhikr] = 0;

            // دالة استخراج تاريخ اليوم بصيغة (YYYY-MM-DD)
            const getTodayString = () => {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            };

            const updateUI = () => {
                requestAnimationFrame(() => {
                    mainCounterEl.innerText = currentSessionCount;
                    currentTotalEl.innerText = counts[currentDhikr];
                    globalTotalEl.innerText = globalTotal;
                    targetBtn.innerText = currentTarget === 0 ? "∞" : currentTarget;
                });
            };

            const saveData = () => {
                localStorage.setItem('dhikrCounts_v5', JSON.stringify(counts));
                localStorage.setItem('globalTotal_v5', globalTotal);
                localStorage.setItem('dailyActivity_v5', JSON.stringify(dailyActivity));
            };

            // ==================================
            // منطق الخريطة الحرارية (Heatmap)
            // ==================================
            const generateHeatmap = () => {
                heatmapGrid.innerHTML = '';
                let maxCount = 0;
                const last35Days = [];
                
                // جلب البيانات واستخراج أعلى قيمة لتحديد مقياس الألوان
                for(let i = 34; i >= 0; i--) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                    const count = dailyActivity[dateStr] || 0;
                    last35Days.push({ dateStr, count });
                    if(count > maxCount) maxCount = count;
                }

                // رسم المربعات وتحديد اللون
                last35Days.forEach(day => {
                    const box = document.createElement('div');
                    box.className = 'heat-box';
                    
                    let intensity = 0;
                    if (day.count > 0) {
                        if (day.count <= maxCount * 0.25) intensity = 1;
                        else if (day.count <= maxCount * 0.5) intensity = 2;
                        else if (day.count <= maxCount * 0.75) intensity = 3;
                        else intensity = 4;
                    }
                    
                    box.setAttribute('data-intensity', intensity);
                    
                    // إظهار تنبيه يوضح التاريخ والعدد عند النقر على المربع
                    box.addEventListener('click', (e) => {
                        e.stopPropagation();
                        alert(`التاريخ: ${day.dateStr}\nالتسبيحات: ${day.count}`);
                    });
                    
                    heatmapGrid.appendChild(box);
                });
            };

            openStatsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                generateHeatmap();
                statsModal.classList.add('active');
            });

            closeStatsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                statsModal.classList.remove('active');
            });

            updateUI();

            tapArea.addEventListener('click', (e) => {
                // منع العد عند التفاعل مع الأزرار أو النافذة المنبثقة
                if (e.target.closest('select, button, .modal-overlay')) return;

                if (currentTarget !== 0 && currentSessionCount === currentTarget) {
                    currentSessionCount = 1;
                } else {
                    currentSessionCount++;
                }

                counts[currentDhikr]++;
                globalTotal++;
                
                // تسجيل التسبيحة في بيانات اليوم للمصفوفة الحرارية
                const today = getTodayString();
                dailyActivity[today] = (dailyActivity[today] || 0) + 1;

                saveData();
                updateUI();
            });

            dhikrSelect.addEventListener('change', (e) => {
                const selectedValue = e.target.value;
                
                if (selectedValue === 'custom') {
                    const customDhikr = prompt("أدخل العبارة المخصصة الجديدة:");
                    if (customDhikr && customDhikr.trim() !== "") {
                        const sanitizedDhikr = customDhikr.trim() + " ▼";
                        const newOption = document.createElement('option');
                        newOption.value = sanitizedDhikr;
                        newOption.innerText = sanitizedDhikr;
                        dhikrSelect.insertBefore(newOption, dhikrSelect.lastElementChild);
                        dhikrSelect.value = sanitizedDhikr;
                        currentDhikr = sanitizedDhikr;
                    } else {
                        dhikrSelect.value = currentDhikr;
                    }
                } else {
                    currentDhikr = selectedValue;
                }

                currentSessionCount = 0;
                if (!counts[currentDhikr]) counts[currentDhikr] = 0;
                updateUI();
            });

            targetBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                currentTargetIndex = (currentTargetIndex + 1) % targetOptions.length;
                currentTarget = targetOptions[currentTargetIndex];
                localStorage.setItem('masbahaTargetIndex_v5', currentTargetIndex);
                currentSessionCount = 0; 
                updateUI();
            });

            resetBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const resetChoice = prompt("اختر نوع التصفير:\n1 - العداد المركزي فقط\n2 - إجمالي الذكر الحالي\n3 - مسح كافة البيانات (بما فيها سجل النشاط)", "1");
                if (resetChoice === null) return;

                switch(resetChoice.trim()) {
                    case "1": 
                        currentSessionCount = 0; 
                        break;
                    case "2":
                        globalTotal -= counts[currentDhikr];
                        counts[currentDhikr] = 0;
                        currentSessionCount = 0;
                        break;
                    case "3":
                        if(confirm("تحذير: هل أنت متأكد من مسح جميع السجلات والنشاط؟")) {
                            counts = {};
                            globalTotal = 0;
                            currentSessionCount = 0;
                            dailyActivity = {}; // تصفير مصفوفة النشاط
                            counts[currentDhikr] = 0;
                            localStorage.removeItem('dhikrCounts_v5');
                            localStorage.removeItem('globalTotal_v5');
                            localStorage.removeItem('dailyActivity_v5');
                        }
                        break;
                    default: return;
                }
                if (resetChoice.trim() !== "3") saveData();
                updateUI();
            });
        });
    </script>
</body>
</html>
